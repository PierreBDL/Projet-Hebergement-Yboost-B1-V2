services:
  - type: web
    name: messagerie-app
    runtime: go
    # Commande de compilation (déjà OK d'après tes logs)
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app
    # C'est ici qu'on corrige : on lance juste le fichier "app"
    startCommand: ./app
    envVars:
      - key: PORT
        value: 3000